<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Tiny ToDo</title>
    <link rel="stylesheet" href="static/login.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <header>
      <h1>Tiny ToDo</h1>
      <div class="info">
        <span id="info-version">User management version</span>
      </div>
    </header>

    <main id="login">
      <form class="form-login" action="/login">
        アカウントを作成しました。<br />
        アカウントは60分間有効です。
        <div class="form-item">
          <label>UserId</label>
          {{input-userId}}
        </div>
        <div class="form-item">
          <label>Password</label>
          {{input-password}}
        </div>
        <div class="form-item">
          <label>Expires</label>
          {{input-expires}}
        </div>
        <button
          type="button"
          class="primary"
          onclick="location.href = '/login'"
        >
          OK
        </button>
      </form>
    </main>
  </body>
</html>
